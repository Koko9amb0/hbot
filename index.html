<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>MODO MiniApp</title>

<style>
:root {
  --bg: #ffffff;
  --text: #111;
  --text-muted: #777;
  --primary: #111;
  --accent: #000;
  --card-bg: #f7f7f7;
  --border: #e5e5e5;
  --radius: 14px;
}

body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
}

* {
  box-sizing: border-box;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header-icons {
  display: flex;
  gap: 14px;
}

.icon-btn {
  font-size: 22px;
  background: none;
  border: none;
  cursor: pointer;
}

/* SEARCH BAR */
.search-bar {
  position: fixed;
  top: -70px;
  left: 0;
  width: 100%;
  background: var(--bg);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  transition: 0.3s ease;
  z-index: 60;
}

.search-bar.open {
  top: 0;
}

.search-input {
  width: 100%;
  padding: 12px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  font-size: 16px;
}

/* CATEGORIES */
.section-title {
  margin: 20px 16px 10px;
  font-size: 18px;
  font-weight: 600;
}

.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 0 16px 10px;
}

.cat-chip {
  padding: 8px 16px;
  background: var(--card-bg);
  border-radius: 20px;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
}

.cat-chip.active {
  background: #111;
  color: #fff;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  padding: 0 16px 80px;
}

.product-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 10px;
}

.product-img-placeholder {
  width: 100%;
  height: 140px;
  background: #eaeaea;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
}

.product-info {
  margin-top: 10px;
}

.product-name {
  font-size: 15px;
  font-weight: 600;
}

.product-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

.product-footer {
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.product-price {
  font-size: 16px;
  font-weight: 700;
}

.product-old-price {
  font-size: 13px;
  color: #999;
  text-decoration: line-through;
  margin-left: 6px;
}

.add-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  background: #111;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
}

.add-btn.added {
  background: #0a0;
}

/* BADGE */
.product-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  background: #111;
  color: #fff;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
}

/* FAVORITE BUTTON */
.fav-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  z-index: 50;
}

.nav-item {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
}

.nav-item.active {
  color: #111;
}

.nav-icon {
  font-size: 22px;
}

/* DRAWERS */
.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  z-index: 90;
}

.cart-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.cart-drawer {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 70%;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  padding: 16px;
  transition: 0.35s ease;
  z-index: 100;
  overflow-y: auto;
}

.cart-drawer.open {
  bottom: 0;
}

.drawer-handle {
  width: 40px;
  height: 5px;
  background: #ccc;
  border-radius: 3px;
  margin: 0 auto 12px;
}

.cart-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
}

/* CART ITEMS */
.cart-item {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.cart-item-img {
  width: 60px;
  height: 60px;
  background: #eee;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}

.cart-item-info {
  flex: 1;
}

.cart-item-name {
  font-size: 15px;
  font-weight: 600;
}

.cart-item-price {
  margin-top: 4px;
  font-size: 14px;
  font-weight: 600;
}

.cart-item-qty {
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.qty-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: #111;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
}

.qty-num {
  font-size: 15px;
}

.remove-btn {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
}

/* TOTAL */
.cart-total {
  display: flex;
  justify-content: space-between;
  padding: 16px 0;
  font-size: 18px;
  font-weight: 700;
}

.checkout-btn {
  width: 100%;
  padding: 14px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

/* EMPTY */
.cart-empty {
  text-align: center;
  padding: 40px 0;
  color: var(--text-muted);
  font-size: 14px;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--radius);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  z-index: 200;
}

.toast.show {
  opacity: 1;
}

/* SPACER */
.spacer {
  height: 80px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">MODO</div>
  <div class="header-icons">
    <button class="icon-btn" onclick="toggleSearch()">🔍</button>
    <button class="icon-btn" onclick="openCart()">🛒</button>
    <span id="cartCount" style="font-size:14px; background:#111; color:#fff; padding:2px 6px; border-radius:10px; display:none;">0</span>
  </div>
</div>

<div class="search-bar" id="searchBar">
  <input class="search-input" placeholder="Поиск..." oninput="filterProducts(this.value)">
</div>

<!-- CATEGORIES -->
<div class="section-title">Категории</div>
<div class="categories">
  <div class="cat-chip active" onclick="filterCat('all', this)">Все</div>
  <div class="cat-chip" onclick="filterCat('tops', this)">Верх</div>
  <div class="cat-chip" onclick="filterCat('bottoms', this)">Низ</div>
  <div class="cat-chip" onclick="filterCat('outerwear', this)">Верхняя одежда</div>
  <div class="cat-chip" onclick="filterCat('accessories', this)">Аксессуары</div>
</div>

<!-- PRODUCTS -->
<div class="section-title" id="productsSection">Товары</div>
<div class="products" id="products"></div>

<div class="spacer"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active">
    <div class="nav-icon">🏠</div>
    Главная
  </div>

  <div class="nav-item" onclick="openFavorites()">
    <div class="nav-icon">❤️</div>
    Избранное
  </div>

  <div class="nav-item" onclick="openProfile()">
    <div class="nav-icon">👤</div>
    Профиль
  </div>
</div>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-handle"></div>
  <div class="cart-title">Корзина</div>

  <div id="cartItems"></div>

  <div class="cart-total" id="cartTotal" style="display:none;">
    <span>Итого:</span>
    <span id="totalPrice">0 ₽</span>
  </div>

  <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" style="display:none;">
    Оформить заказ
  </button>
</div>

<!-- FAVORITES OVERLAY -->
<div class="cart-overlay" id="favOverlay" onclick="closeFavorites()"></div>

<div class="cart-drawer" id="favDrawer">
  <div class="drawer-handle"></div>
  <div class="cart-title">Избранное</div>
  <div id="favItems"></div>
</div>

<!-- PROFILE OVERLAY -->
<div class="cart-overlay" id="profileOverlay" onclick="closeProfile()"></div>

<div class="cart-drawer" id="profileDrawer">
  <div class="drawer-handle"></div>
  <div class="cart-title">Профиль</div>

  <div id="profileContent"></div>

  <div class="section-title" style="margin-top:20px;">Мои заказы</div>
  <div id="ordersList"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<script>
const tg = window.Telegram?.WebApp ?? { expand: () => {}, initData: "" };
tg.expand();

const API = "https://survive-birth-alex-supplied.trycloudflare.com/api";

let USER_ID = null;
let USER = null;
let FAVORITES = [];
let CART = [];
let ORDERS = [];

// TOAST
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// SEARCH
function toggleSearch() {
  document.getElementById("searchBar").classList.toggle("open");
}

function filterProducts(text) {
  text = text.toLowerCase();
  document.querySelectorAll(".product-card").forEach(card => {
    const name = card.dataset.name.toLowerCase();
    card.style.display = name.includes(text) ? "block" : "none";
  });
}

// CATEGORY FILTER
function filterCat(cat, el) {
  document.querySelectorAll(".cat-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".product-card").forEach(card => {
    if (cat === "all" || card.dataset.cat === cat) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}

function scrollToProducts() {
  document.getElementById("productsSection").scrollIntoView({ behavior: "smooth" });
}

// RENDER PRODUCTS
function renderProducts() {
  const list = document.getElementById("products");
  list.innerHTML = "";

  PRODUCTS.forEach(p => {
    const isFav = FAVORITES.includes(p.id);
    const inCart = CART.find(i => i.product_id === p.id);

    list.innerHTML += `
      <div class="product-card" data-name="${p.name}" data-cat="${p.cat}">
        <div style="position:relative;">
          <div class="product-img-placeholder">🛍️</div>

          <button class="fav-btn" onclick="toggleFavorite(${p.id})">
            ${isFav ? "❤️" : "🤍"}
          </button>

          ${p.badge ? `<div class="product-badge">${p.badge}</div>` : ""}
        </div>

        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-sub">${p.sub}</div>

          <div class="product-footer">
            <div>
              <span class="product-price">${p.price} ₽</span>
              ${p.old ? `<span class="product-old-price">${p.old} ₽</span>` : ""}
            </div>

            <button class="add-btn ${inCart ? "added" : ""}" onclick="addToCart(${p.id})">
              +
            </button>
          </div>
        </div>
      </div>
    `;
  });
}

// FAVORITES
function toggleFavorite(id) {
  if (FAVORITES.includes(id)) {
    FAVORITES = FAVORITES.filter(f => f !== id);
  } else {
    FAVORITES.push(id);
  }
  saveFavorites();
  renderProducts();
  renderFavorites();
}

function renderFavorites() {
  const box = document.getElementById("favItems");
  box.innerHTML = "";

  if (FAVORITES.length === 0) {
    box.innerHTML = `<div class="cart-empty">Нет избранных товаров</div>`;
    return;
  }

  FAVORITES.forEach(id => {
    const p = PRODUCTS.find(x => x.id === id);
    box.innerHTML += `
      <div class="cart-item">
        <div class="cart-item-img">🛍️</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-price">${p.price} ₽</div>
        </div>
        <button class="remove-btn" onclick="toggleFavorite(${id})">✖</button>
      </div>
    `;
  });
}

function openFavorites() {
  document.getElementById("favOverlay").classList.add("open");
  document.getElementById("favDrawer").classList.add("open");
}

function closeFavorites() {
  document.getElementById("favOverlay").classList.remove("open");
  document.getElementById("favDrawer").classList.remove("open");
}

// CART
function addToCart(id) {
  const item = CART.find(i => i.product_id === id);
  if (item) {
    item.qty++;
  } else {
    CART.push({ product_id: id, qty: 1 });
  }
  saveCart();
  renderProducts();
  renderCart();
}

function changeQty(id, delta) {
  const item = CART.find(i => i.product_id === id);
  if (!item) return;

  item.qty += delta;
  if (item.qty <= 0) {
    CART = CART.filter(i => i.product_id !== id);
  }

  saveCart();
  renderCart();
  renderProducts();
}

function renderCart() {
  const box = document.getElementById("cartItems");
  const totalBox = document.getElementById("cartTotal");
  const checkoutBtn = document.getElementById("checkoutBtn");
  const countBadge = document.getElementById("cartCount");

  box.innerHTML = "";

  if (CART.length === 0) {
    box.innerHTML = `<div class="cart-empty">Корзина пуста</div>`;
    totalBox.style.display = "none";
    checkoutBtn.style.display = "none";
    countBadge.style.display = "none";
    return;
  }

  let total = 0;

  CART.forEach(i => {
    const p = PRODUCTS.find(x => x.id === i.product_id);
    total += p.price * i.qty;

    box.innerHTML += `
      <div class="cart-item">
        <div class="cart-item-img">🛍️</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-price">${p.price} ₽</div>

          <div class="cart-item-qty">
            <button class="qty-btn" onclick="changeQty(${p.id}, -1)">-</button>
            <span class="qty-num">${i.qty}</span>
            <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
          </div>
        </div>

        <button class="remove-btn" onclick="changeQty(${p.id}, -999)">✖</button>
      </div>
    `;
  });

  document.getElementById("totalPrice").innerText = total + " ₽";
  totalBox.style.display = "flex";
  checkoutBtn.style.display = "block";

  countBadge.innerText = CART.length;
  countBadge.style.display = "inline-block";
}

function openCart() {
  document.getElementById("cartOverlay").classList.add("open");
  document.getElementById("cartDrawer").classList.add("open");
}

function closeCart() {
  document.getElementById("cartOverlay").classList.remove("open");
  document.getElementById("cartDrawer").classList.remove("open");
}

// PROFILE
function openProfile() {
  document.getElementById("profileOverlay").classList.add("open");
  document.getElementById("profileDrawer").classList.add("open");
}

function closeProfile() {
  document.getElementById("profileOverlay").classList.remove("open");
  document.getElementById("profileDrawer").classList.remove("open");
}

function renderProfile() {
  const box = document.getElementById("profileContent");
  box.innerHTML = `
    <div style="display:flex; gap:12px; align-items:center;">
      <div style="width:60px; height:60px; background:#eee; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px;">
        👤
      </div>
      <div>
        <div style="font-size:16px; font-weight:600;">${USER.first_name || ""} ${USER.last_name || ""}</div>
        <div style="font-size:14px; color:#777;">@${USER.username || "нет username"}</div>
      </div>
    </div>
  `;

  renderOrders();
}

function renderOrders() {
  const box = document.getElementById("ordersList");
  box.innerHTML = "";

  if (ORDERS.length === 0) {
    box.innerHTML = `<div class="cart-empty">Заказов пока нет</div>`;
    return;
  }

  ORDERS.forEach(o => {
    box.innerHTML += `
      <div style="padding:12px 0; border-bottom:1px solid #eee;">
        <div style="font-weight:600;">Заказ №${o.id}</div>
        <div style="font-size:14px; color:#777;">${o.date}</div>
        <div style="margin-top:6px; font-size:15px;">Итого: ${o.total} ₽</div>
      </div>
    `;
  });
}

// CHECKOUT
async function checkout() {
  if (CART.length === 0) return;

  const items = CART.map(i => ({
    product_id: i.product_id,
    qty: i.qty
  }));

  const total = items.reduce((s, i) => {
    const p = PRODUCTS.find(x => x.id === i.product_id);
    return s + p.price * i.qty;
  }, 0);

  const res = await fetch(API + "/order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: USER_ID,
      items,
      total
    })
  });

  const data = await res.json();
  ORDERS = data.orders;

  CART = [];
  saveCart();
  renderCart();
  renderOrders();

  showToast("Заказ оформлен!");
}

// SAVE TO SERVER
async function saveFavorites() {
  await fetch(API + "/favorites", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: USER_ID,
      favorites: FAVORITES
    })
  });
}

async function saveCart() {
  await fetch(API + "/cart", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: USER_ID,
      cart: CART
    })
  });
}

// LOAD USER DATA
async function loadUserData() {
  const res = await fetch(API + "/data?user_id=" + USER_ID);
  const data = await res.json();

  FAVORITES = data.favorites;
  CART = data.cart;
  ORDERS = data.orders;

  renderProducts();
  renderFavorites();
  renderCart();
  renderOrders();
}

// AUTH
async function auth() {
  const initData = tg.initData;

  const res = await fetch(API + "/auth", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ initData })
  });

  const data = await res.json();

  USER_ID = data.user_id;
  USER = data.user;

  renderProfile();
  await loadUserData();
}
let PRODUCTS = [];

async function init() {
  // Загружаем товары из БД
  const res = await fetch(API + "/products");
  PRODUCTS = await res.json();
  renderProducts();

  // Авторизация — если упадёт, товары уже видны
  auth().catch(err => console.warn("Auth failed:", err));
}

init();
</script>

</body>
</html>
